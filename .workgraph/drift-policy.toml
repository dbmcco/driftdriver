schema = 1
mode = "redirect"
order = ["speedrift", "specdrift", "datadrift", "depsdrift", "uxdrift", "therapydrift", "yagnidrift"]

[recursion]
cooldown_seconds = 1800
max_auto_actions_per_hour = 2
require_new_evidence = true
max_auto_depth = 2

[factory_brain]
enabled = false
signal_gate_enabled = true
dry_run = true
# Disabled 2026-03-25 — was firing Tier 2 (Sonnet) every 10 min with full 1.7MB snapshot (~$160/day).
# Re-enable after signal gate validation and dry-run log review (see .workgraph/brain-dryruns.jsonl).
# Rollout: (1) run dry_run=true for 48h, (2) confirm cost meter within budget,
# (3) confirm dispatch pipeline healthy, (4) dry-run log shows actionable findings,
# then set dry_run=false and enabled=true to go live.

[factory]
enabled = true
cycle_seconds = 90
plan_only = false
max_repos_per_cycle = 4
max_actions_per_cycle = 12
emit_followups = true
max_followups_per_repo = 3
write_decision_ledger = true
hard_stop_on_failed_verification = true

[autonomy.default]
level = "safe-fix"
can_push = false
can_open_pr = false
can_merge = false
max_actions_per_cycle = 3

[secdrift]
enabled = true
interval_seconds = 14400
max_findings_per_repo = 40
scan_max_files = 320
scan_max_file_bytes = 262144
run_pentest = false
allow_network_scans = false
target_urls = []
emit_review_tasks = true
max_review_tasks_per_repo = 3
hard_stop_on_critical = false

[qadrift]
enabled = true
interval_seconds = 21600
max_findings_per_repo = 40
emit_review_tasks = true
max_review_tasks_per_repo = 3
include_playwright = true
include_test_health = true
include_workgraph_health = true

[northstardrift]
enabled = true
emit_review_tasks = true
emit_operator_prompts = true
daily_rollup = true
weekly_trends = true
max_review_tasks_per_repo = 2
signal_gate_enabled = false
# signal_gate_enabled: when true, a disk-persisted snapshot hash is checked
# before every LLM alignment call.  If the hash matches the last-run hash,
# the LLM call is skipped and the cached result is reused.  Set to true
# after validating 48h token-spend delta in .workgraph/gate-validation/northstardrift.json.

[northstardrift.targets]
overall = 82.0
continuity = 85.0
autonomy = 82.0
quality = 80.0
coordination = 78.0
self_improvement = 76.0

[northstardrift.alignment]
statement = "Driftdriver is the drift-check orchestrator that keeps code, specs, and intent in sync across the Speedrift ecosystem without hard-blocking work"
keywords = ["drift", "quality", "orchestration", "lanes", "sync", "convergence", "attractor"]
anti_patterns = ["hard-blocking", "manual-only", "untracked-drift"]

[enforcement]
enabled = false
block_on_critical = true
warn_on_error = true
max_unresolved_warnings = 10


[routing]
enabled = true
default_executor = "claude"

[routing.executors.samantha]
type = "http"
endpoint = "http://localhost:3530/api/agent/task"
tag_match = "agent:samantha"

[routing.executors.derek]
type = "http"
endpoint = "http://localhost:3531/api/agent/task"
tag_match = "agent:derek"

[routing.executors.ingrid]
type = "http"
endpoint = "http://localhost:3532/api/agent/task"
tag_match = "agent:ingrid"

[routing.executors.caroline]
type = "http"
endpoint = "http://localhost:3533/api/agent/task"
tag_match = "agent:caroline"

[speedriftd]
signal_gate_enabled = false
# signal_gate_enabled: speedriftd makes no LLM calls (pure runtime coordination),
# so this flag is unused.  Present for consistency with other daemon sections.

[attractor]
target = "onboarded"
signal_gate_enabled = false
# signal_gate_enabled: when true, attractor loop skips LLM pass if findings
# hash is unchanged since last run (disk-persisted in .workgraph/attractor-gate-state.json).
# Enable after verifying 48h before/after token spend via canary log.

[watchdog]
warn_per_hour_usd = 1.0
kill_per_hour_usd = 5.0
kill_per_5min_usd = 2.0

[authority]
# Registered drift agents with per-class budgets.
# northstardrift wires as actor_class="lane".
# attractor-loop and factory-brain wire as actor_class="daemon".
global_ceiling = 50

[authority.grants]
lane   = ["read", "create"]
daemon = ["read", "create", "dispatch"]

[authority.budgets.lane]
max_active_tasks        = 3
max_creates_per_hour    = 10
max_dispatches_per_hour = 0

[authority.budgets.daemon]
max_active_tasks        = 10
max_creates_per_hour    = 20
max_dispatches_per_hour = 10
